<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="./style.css">
        <script src="./script.js"></script>
        <title>Casino Universe Website</title>
    </head>
    <body>
        <div class="navDiv">
            <button onclick="homeButton()">
                <img src="./Images/home.svg" alt="Home Button" id="icon">
            </button>
            <button onclick="plusButton()">
            <img src="./Images/plus.svg" alt="Add Button" id="icon">
            </button>
            <button onclick="ocsButton()">
            <img src="./Images/ocs.svg" alt="OCs Button" id="icon">
            </button>
            <button onclick="loreButton()">
            <img src="./Images/book-alt.svg" alt="Lore Button" id="icon">

        </div>
        <div class="peepeeandpoopoo">
            <div class="mainBox">
                <div class="homeBox" id="homeBoxID" style="background-color: red;">
                    <img src="./Images/home.svg" alt="home" id="icon">
                </div>
                <div class="addBox" id="addBoxID" style="background-color: blue;">
                    <img src="./Images/plus.svg" alt="home" id="icon">
                </div>
                <div class="ocsBox" id="ocsBoxID" style="background-color: green;">
                    <img src="./Images/ocs.svg" alt="home" id="icon" style="display: inline;">
                    <h2 style="display: inline;"> Current time: 1957 </h2>

                    <div class="Box">

                        <button class="OCProfile" alt="Jay Profile">
                            <img src="./Images/Profiles/OCs/Screenshot_2312.png" class="OCProfileImg">
                            <h3 id="OCName">Jay Adams</h3>
                            <h5 id="OCBD">1923 - (Death Year) | 34</h5>
                        </button>

                        <button class="OCProfile" alt="Martin Profile">
                            <img src="./Images/Profiles/placeholderProfile" class="OCProfileImg">
                            <h3 id="OCName">Martin Anderson</h3>
                            <h5 id="OCBD">1923 - (Death Year) | 34</h5>
                        </button>

                        <button class="OCProfile" alt="Mary Profile">
                            <img src="./Images/Profiles/placeholderProfile" class="OCProfileImg">
                            <h3 id="OCName">Mary Jones</h3>
                            <h5 id="OCBD">1923 - (Death Year) | 34</h5>
                        </button>

                        <button class="OCProfile" alt="Lilly Profile">
                            <img src="./Images/Profiles/placeholderProfile" class="OCProfileImg">
                            <h3 id="OCName">Lillian</h3>
                            <h5 id="OCBD">1937 - (Death Year) | 20</h5>
                        </button>

                        <button class="OCProfile" alt="Margarita Profile">
                            <img src="./Images/Profiles/placeholderProfile" class="OCProfileImg">
                            <h3 id="OCName">Margarita Roosevelt</h3>
                            <h5 id="OCBD">1935 - (Death Year) | 22</h5>
                        </button>

                        <button class="OCProfile" alt="Asher Profile">
                            <img src="./Images/Profiles/placeholderProfile" class="OCProfileImg">
                            <h3 id="OCName">Asher Walsh</h3>
                            <h5 id="OCBD">1927 - (Death Year) | 30</h5>
                        </button>

                    </div>
                    
                </div>
                <div class="loreBox" id="loreBoxID" style="background-color: pink;">
                    <img src="./Images/book-alt.svg" alt="home" id="icon">
                </div>
            </div>
            <div class="credits">
                <div class="contributorProfile">
                    <img src="./Images/poop.png" class="circleProfile">
                    <h3>Fuckface<br>poo</h3>
                </div>
            </div>
